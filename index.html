<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scientific Playground</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/algebrite/dist/algebrite.bundle-for-browser.js"></script>
<script src="https://unpkg.com/mathjs@7.0.0/dist/math.min.js"></script>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body>

<header>
<h1>Scientific Playground</h1>
</header>

<nav class="tabs">
  <button data-tab="plotter" class="active">Plotter</button>
  <button data-tab="methods">Methods</button>
  <button data-tab="physics">Physics</button>
</nav>

<div class="view active" id="plotter">

<button id="togglePanel">⚙ Controls</button>

<div class="layout">

<!-- LEFT PANEL -->
<div class="panel controls-panel">

<h2>Function</h2>

<input id="eq" value="2*sin(x)+4*cos(x/2)">

<div class="row inline-inputs">
  <label>min <input id="min" value="0"></label>
  <label>max <input id="max" value="10"></label>
  <label>step <input id="step" value="0.01"></label>
</div>

<h3>Derivative</h3>
<input id="dev1" value="2*cos(x)-2*sin(x/2)">
<label>h = <span id="hVal">0.01</span></label>
<input id="h" type="range" min="0.001" max="1" step="0.001" value="0.01">

<h3>Second derivative</h3>
<input id="dev2">
<label>h₂ = <span id="h2Val">0.01</span></label>
<input id="h2" type="range" min="0.001" max="1" step="0.001" value="0.01">

<h3>Integral</h3>
<input id="int" value="-2*cos(x)+8*sin(x/2)">

<div class="row inline-inputs">
  <label>x0 <input id="intX0" type="number" step="0.1" value="0"></label>
</div>
<label>F(x0) = <span id="f0Val">0</span></label>
<input id="f0Slider" type="range" min="-10" max="10" step="0.1" value="0">
<label>C = <span id="cVal">0</span></label>

<label>h = <span id="hIntVal">0.01</span></label>
<input id="hInt" type="range" min="0.001" max="1" step="0.001" value="0.01">
<div id="integralStatus" class="status"></div>

<button id="plotBtn">Plot</button>

</div>

<!-- RIGHT PANEL -->
<div class="panel">

<div class="controls">

  <div class="controls-row">
    <span class="label">Function</span>
    <label><input type="checkbox" data-type="function" checked> f(x)</label>
  </div>
  <div class="controls-row">
    <span class="label">Derivatives</span>
    <label><input type="checkbox" data-type="analytic"> analytic</label>
    <label><input type="checkbox" data-type="num_sym"> sym</label>
    <label><input type="checkbox" data-type="num_asym"> asym</label>
    <label><input type="checkbox" data-type="tangent"> tangents</label>
  </div>
  <div class="controls-row">
	<span class="label">2nd Derivative</span>
	<label><input type="checkbox" data-type="analytic2"> analytic</label>
	<label><input type="checkbox" data-type="num2"> numeric</label>
	<label><input type="checkbox" data-type="tangent2">parabolic tangent</label>
  </div>

  <div class="controls-row">
    <span class="label">Integral</span>
    <label><input type="checkbox" data-type="integral"> integral</label>
	<label><input type="checkbox" data-type="num_left"> left</label>
	<label><input type="checkbox" data-type="num_right"> right</label>
	<label><input type="checkbox" data-type="num_mid"> midpoint</label>
	<label><input type="checkbox" data-type="num_trap"> trap</label>
	<label><input type="checkbox" data-type="num_simpson"> Simpson</label>
    <label><input type="checkbox" data-type="integral_shapes"> shapes</label>
  </div>

  <div class="controls-row">
    <span class="label">Display</span>
    <label><input type="checkbox" id="showValues" checked> values</label>
  </div>

</div>

<div id="plot"></div>

</div>

</div>
</div>

<div class="view" id="methods">
<div class="methods-layout">
  <div class="panel methods-controls-panel">
    <h2>Numerical Methods</h2>

    <label>equation y' = f(t, y)</label>
    <input id="odeEquation" value="y">

    <div class="row inline-inputs">
      <label>t0 <input id="odeT0" type="number" step="0.1"></label>
      <label>t1 <input id="odeT1" type="number" step="0.1"></label>
      <label>h <input id="odeH" type="number" step="0.001"></label>
    </div>

    <label>start value y(t0)</label>
    <input id="odeY0" type="number" step="0.1" value="1">

    <label>known solution y(t)</label>
    <input id="odeExact" value="exp(t)">

    <div id="odeStatus" class="status"></div>
    <button id="odePlotBtn">Plot methods</button>
  </div>

  <div class="panel methods-output-panel">
    <div class="controls" id="odeMethodControls"></div>
    <div id="odeMethodHint" class="method-hint"></div>
    <div class="controls compact-controls">
      <div class="controls-row">
        <span class="label">Display</span>
        <label><input type="checkbox" id="odeShowPoints" checked> step points</label>
        <label><input type="checkbox" id="odeShowStepView" checked> show on hover</label>
        <label><input type="checkbox" id="odeFocusHover" checked> focus method</label>
        <label><input type="checkbox" id="odeSlopeField"> slope field</label>
      </div>
    </div>
    <div class="methods-plot-grid">
      <div id="odeTimePlot" class="methods-plot"></div>
      <div id="odeStepZoomPanel" class="step-zoom-panel">
        <div id="odeStepZoomPlot" class="methods-plot step-zoom-plot"></div>
      </div>
      <div id="odeStepText" class="step-explanation"></div>
      <div id="odeErrorPlot" class="methods-plot"></div>
    </div>
  </div>
</div>
</div>

<div class="view" id="physics">
<h2>Physics Simulation (coming soon)</h2>
</div>

<script src="constants.js"></script>
<script src="dom.js"></script>
<script src="math-utils.js"></script>
<script src="plot-state.js"></script>
<script src="plot-core.js"></script>
<script src="plot-interactions.js"></script>
<script src="ode-methods.js"></script>
<script src="methods-lab.js"></script>
<script src="ui.js"></script>
<script src="plotter.js"></script>
<script src="app.js"></script>
</body>
</html>
